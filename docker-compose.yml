version: '3.8'

services:
  modbustcp-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: modbustcp-service
    restart: unless-stopped
    
    # Environment variables
    environment:
      - MODBUS_ENVIRONMENT=production
      - MODBUS_DEBUG=false
    
    # Volumes
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./logs:/var/log/modbustcp
    
    # Network mode for MODBUS TCP access
    network_mode: host
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.path.insert(0, '/app/src'); from infrastructure.modbus import PyModbusClient; print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Default command (can be overridden)
    command: ["python", "-m", "presentation.cli.main", "info"]

  # Optional: Add a monitoring service
  modbustcp-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: modbustcp-monitor
    restart: unless-stopped
    depends_on:
      - modbustcp-service
    
    environment:
      - MODBUS_ENVIRONMENT=production
      - MODBUS_DEBUG=false
    
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./logs:/var/log/modbustcp
    
    network_mode: host
    
    # Run monitoring command
    command: ["python", "-m", "presentation.cli.main", "monitor", "health-all"]

# Create named volumes for persistent data
volumes:
  modbustcp-data:
    driver: local
  modbustcp-logs:
    driver: local